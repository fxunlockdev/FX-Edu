<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Academy, Notifications</title>
<link rel="stylesheet" href="../assets/lumina.css">
<script src="../assets/shell.js"></script>
<script src="../assets/lumina.js"></script>
<style>
  .nwrap{max-width:720px;}
  .ntabs{display:flex;gap:4px;border-bottom:1px solid var(--outline-var);margin-bottom:18px;}
  .nt{padding:10px 16px;font-size:14px;font-weight:600;color:var(--on-surface-var);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:.15s;}
  .nt.on{color:var(--primary);border-bottom-color:var(--lime-dim);}
  .nrow{display:flex;gap:14px;align-items:flex-start;background:var(--c-lowest);border:1px solid var(--outline-var);border-radius:var(--r-lg);padding:15px 17px;box-shadow:var(--shadow-sm);margin-bottom:11px;transition:border-color .2s;position:relative;}
  .nrow.unread{border-color:rgba(168,214,66,.5);background:linear-gradient(90deg,rgba(168,214,66,.05),var(--c-lowest) 60%);}
  .nrow.unread::before{content:'';position:absolute;top:18px;right:16px;width:8px;height:8px;border-radius:50%;background:var(--lime-dim);}
  .nic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;}
</style>
</head>
<body>
<div class="app">
  <div id="side"></div>
  <div class="app-main">
    <div id="top"></div>
    <div class="app-body">
      <div class="nwrap">
        <div class="between" style="margin-bottom:16px;">
          <div><h1 class="h-md" style="margin:0;">Notifications</h1><p class="muted" style="margin:4px 0 0;">3 unread</p></div>
          <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.nrow').forEach(r=>r.classList.remove('unread'));FX.toast('All caught up')">Mark all read</button>
        </div>
        <div class="ntabs">
          <div class="nt on">All</div>
          <div class="nt">Webinars</div>
          <div class="nt">Community</div>
          <div class="nt">Progress</div>
        </div>
        <div id="list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const plan = new URLSearchParams(location.search).get('plan')||'pro';
document.getElementById('side').outerHTML = FXShell.surfaceSidebar('member','',{plan});
document.head.insertAdjacentHTML('beforeend', FXShell.appStyles());
document.getElementById('top').outerHTML = FXShell.appTop({title:'Notifications', right:`<span class="chip ${plan==='basic'?'chip-outline':'chip-lime'}">${plan==='basic'?'Basic':'Pro'}</span>`});

const ICON={
  live:['rgba(255,90,90,.14)','#d23','<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M5 12a7 7 0 0 1 14 0"/></svg>'],
  idea:['rgba(168,214,66,.18)','#4f6e0a','<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 21h4M12 2a7 7 0 0 1 4 12.7c-.7.5-1 .9-1 1.8H9c0-.9-.3-1.3-1-1.8A7 7 0 0 1 12 2Z"/></svg>'],
  community:['rgba(31,107,138,.14)','#1f6b8a','<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1 1 21 11.5Z"/></svg>'],
  cert:['rgba(15,50,24,.12)','#0f3218','<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="6"/><path d="m9 14-2 7 5-3 5 3-2-7"/></svg>']
};
const items=[
  ['live','London Session webinar starts soon','Marcus Vale goes live in 30 minutes. Your seat is reserved.','30m',1],
  ['idea','New trade idea from Dana Cole','XAU/USD pre-CPI analysis. Educational only, study the framework.','2h',1],
  ['community','Priya R. replied to your post','“Great markup, the reclaim was clean.” in #technical-analysis','3h',1],
  ['cert','Certificate progress: Tier 3','You\'re 72% through Risk & Trade Management. Keep going.','1d',0],
  ['community','Your post earned 24 reactions','Your liquidity observation in #general is resonating.','1d',0],
  ['idea','Weekly idea recap is ready','5 educator ideas from this week, with the lessons behind them.','2d',0]
];
document.getElementById('list').innerHTML = items.map(n=>{
  const ic=ICON[n[0]];
  return `<div class="nrow ${n[4]?'unread':''}"><span class="nic" style="background:${ic[0]};color:${ic[1]};">${ic[2]}</span>
    <div style="flex:1;padding-right:20px;"><div style="font-weight:700;font-size:14.5px;">${n[1]}</div><p class="muted" style="font-size:13px;margin:3px 0 0;line-height:1.45;">${n[2]}</p></div>
    <span class="muted" style="font-size:12px;white-space:nowrap;">${n[3]}</span></div>`;
}).join('');
document.querySelectorAll('.nt').forEach(t=>t.onclick=()=>{document.querySelectorAll('.nt').forEach(x=>x.classList.remove('on'));t.classList.add('on');});
document.querySelectorAll('.nrow').forEach(r=>r.onclick=()=>r.classList.remove('unread'));
</script>
</body>
</html>
