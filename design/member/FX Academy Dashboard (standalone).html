document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Surfaces (light canvas) */\n  --surface: #f7f9f4;\n  --surface-dim: #d8dbd6;\n  --surface-bright: #ffffff;\n  --c-lowest: #ffffff;\n  --c-low: #f1f4ed;\n  --c: #eaeee6;\n  --c-high: #e3e7df;\n  --c-highest: #dce0d8;\n\n  /* Ink */\n  --on-surface: #161a17;\n  --on-surface-var: #444b44;\n  --outline: #6e756d;\n  --outline-var: #cdd3c9;\n\n  /* Brand greens */\n  --primary: #0f3218;          /* forest, usable as bg */\n  --primary-deep: #001c07;     /* near-black forest */\n  --on-primary: #ffffff;\n  --primary-container: #c4edc6;\n  --on-primary-container: #00210a;\n  --primary-tint: #3c5a41;\n\n  /* Lime accent */\n  --lime: #c3f35c;\n  --lime-dim: #a8d642;\n  --lime-bright: #d6ff7a;\n  --lime-ink: #4f6e0a;         /* lime that reads on light bg */\n  --on-lime: #141f00;\n\n  /* Tertiary leaf */\n  --leaf: #6c9e75;\n  --leaf-deep: #003315;\n\n  /* Functional */\n  --pos: #4ea863;          --pos-on-dark: #9fe0ad;\n  --warn: #e0a235;         --warn-on-dark: #f3c668;\n  --neg: #ba1a1a;          --neg-on-dark: #ff897d;\n  --error-container: #ffdad6;\n  --on-error-container: #93000a;\n\n  /* Dark-section tokens (hero / dashboards) */\n  --d-bg: #091310;             /* deep charcoal-forest */\n  --d-bg-2: #0f1d16;\n  --d-surface: #14241b;        /* card on dark */\n  --d-surface-2: #1b3024;\n  --d-ink: #f1f5ef;\n  --d-ink-var: #b3c4b8;\n  --d-outline: rgba(255,255,255,0.10);\n  --d-outline-strong: rgba(255,255,255,0.18);\n  --glass-dark: rgba(255,255,255,0.06);\n  --glass-dark-2: rgba(255,255,255,0.04);\n\n  /* Type families — webfont first, premium system fallback (never serif) */\n  --font-display: 'Hanken Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n  --font-body: 'Manrope', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n\n  /* Motion — Apple-like spring-out easing */\n  --ease: cubic-bezier(.22,1,.36,1);\n  --ease-out: cubic-bezier(.16,1,.3,1);\n  --ease-in-out: cubic-bezier(.65,.05,.36,1);\n\n  /* Radii */\n  --r-sm: 0.25rem;\n  --r: 0.5rem;\n  --r-md: 0.75rem;\n  --r-lg: 1rem;\n  --r-xl: 1.5rem;\n  --r-2xl: 2rem;\n  --r-full: 9999px;\n\n  /* Spacing rhythm (8px) */\n  --s1: 8px;  --s2: 16px; --s3: 24px; --s4: 32px;\n  --s5: 40px; --s6: 48px; --s8: 64px; --s10: 80px;\n\n  --maxw: 1200px;\n  --shadow-sm: 0 1px 2px rgba(16,33,24,.05), 0 1px 3px rgba(16,33,24,.04);\n  --shadow: 0 6px 20px rgba(16,33,24,.07), 0 1px 4px rgba(16,33,24,.05);\n  --shadow-lg: 0 24px 60px -12px rgba(16,33,24,.18), 0 6px 16px rgba(16,33,24,.06);\n  --shadow-dark: 0 32px 70px -16px rgba(0,0,0,.6), 0 6px 18px rgba(0,0,0,.35);\n}\n\n* { box-sizing: border-box; }\nhtml {\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  scroll-behavior: smooth;\n}\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: 16px; line-height: 1.55;\n  color: var(--on-surface);\n  background: var(--surface);\n  font-feature-settings: \"cv11\",\"ss01\";\n}\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n::selection { background: var(--lime); color: var(--on-lime); }\n:focus-visible { outline: 2px solid var(--lime-dim); outline-offset: 2px; border-radius: 4px; }\n\n/* ---------- Typography ----------\n   Headings INHERIT color so they read correctly on both light canvas\n   and dark sections (no more dark-on-dark washout). */\nh1,h2,h3,h4,h5 {\n  font-family: var(--font-display);\n  margin: 0; font-weight: 600; letter-spacing: -.02em;\n  color: inherit; text-wrap: balance;\n}\n.display {\n  font-family: var(--font-display);\n  font-size: clamp(42px, 5.4vw, 66px); font-weight: 700;\n  line-height: 1.02; letter-spacing: -.035em; text-wrap: balance;\n}\n.h-lg { font-size: clamp(30px, 3.6vw, 46px); font-weight: 600; line-height: 1.08; letter-spacing: -.028em; text-wrap: balance; }\n.h-md { font-size: clamp(23px, 2.4vw, 31px); font-weight: 600; line-height: 1.16; letter-spacing: -.02em; }\n.h-sm { font-size: 21px; font-weight: 600; line-height: 1.25; letter-spacing: -.015em; }\n.eyebrow { font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--primary-tint); }\n.body-lg { font-size: 18px; line-height: 1.62; color: var(--on-surface-var); }\n.muted { color: var(--on-surface-var); }\n.num { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\"; }\n.mono-num { font-family: var(--font-display); font-variant-numeric: tabular-nums; letter-spacing: -.01em; }\n\n/* ---------- Layout ---------- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--s5); }\n@media (max-width: 720px){ .wrap{ padding: 0 20px; } }\n.section { padding: var(--s10) 0; }\n.stack { display: flex; flex-direction: column; }\n.row { display: flex; align-items: center; }\n.between { display:flex; align-items:center; justify-content: space-between; }\n.gap1{gap:8px}.gap2{gap:16px}.gap3{gap:24px}.gap4{gap:32px}\n.grid { display: grid; gap: var(--s3); }\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  font-family: var(--font-body); font-weight: 700; font-size: 15px;\n  padding: 13px 22px; border-radius: var(--r-full); border: 1px solid transparent;\n  transition: transform .22s var(--ease), background .2s ease, box-shadow .25s var(--ease), border-color .2s, color .2s;\n  white-space: nowrap; line-height: 1; will-change: transform;\n}\n.btn:hover { transform: translateY(-1.5px); }\n.btn:active { transform: translateY(0); transition-duration: .05s; }\n.btn-lime { background: var(--lime); color: var(--on-lime); box-shadow: 0 2px 0 var(--lime-dim); }\n.btn-lime:hover { background: var(--lime-bright); box-shadow: 0 10px 26px -6px rgba(168,214,66,.55); }\n.btn-forest { background: var(--primary); color: #fff; box-shadow: 0 2px 0 var(--primary-deep); }\n.btn-forest:hover { background: var(--primary-deep); box-shadow: 0 10px 26px -8px rgba(15,50,24,.5); }\n.btn-ghost { background: transparent; color: var(--on-surface); border-color: var(--outline-var); }\n.btn-ghost:hover { background: var(--c-low); border-color: var(--outline); }\n.btn-glass { background: var(--glass-dark); color: var(--d-ink); border-color: var(--d-outline-strong); backdrop-filter: blur(12px); }\n.btn-glass:hover { background: rgba(255,255,255,.13); border-color: rgba(255,255,255,.3); }\n.btn-sm { padding: 9px 15px; font-size: 13.5px; }\n.btn-lg { padding: 16px 28px; font-size: 16px; }\n.btn-block { width: 100%; }\n\n/* ---------- Chips / badges ---------- */\n.chip { display:inline-flex; align-items:center; gap:6px; padding: 5px 11px; border-radius: var(--r-full);\n  font-size: 12.5px; font-weight: 600; line-height: 1.2; background: var(--c); color: var(--on-surface-var); border:1px solid transparent; white-space: nowrap; }\n.chip-lime { background: rgba(168,214,66,.20); color: #3c5a00; border-color: rgba(168,214,66,.4); }\n.chip-lime-d { background: rgba(168,214,66,.16); color: var(--lime); border-color: rgba(168,214,66,.38); }\n.chip-forest { background: var(--primary-container); color: var(--on-primary-container); }\n.chip-pos { background: rgba(78,168,99,.16); color: #2c6b3d; }\n.chip-warn { background: rgba(224,162,53,.18); color: #8a5a06; }\n.chip-neg { background: var(--error-container); color: var(--on-error-container); }\n.chip-outline { background: transparent; border-color: var(--outline-var); color: var(--on-surface-var); }\n.dot { width:7px; height:7px; border-radius:50%; background: var(--lime-dim); display:inline-block; }\n.dot-live { background:#ff5a5a; box-shadow:0 0 0 0 rgba(255,90,90,.6); animation: pulse 1.6s infinite; }\n@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,90,90,.5)} 70%{box-shadow:0 0 0 7px rgba(255,90,90,0)} 100%{box-shadow:0 0 0 0 rgba(255,90,90,0)} }\n\n/* ---------- Cards ---------- */\n.card { background: var(--c-lowest); border: 1px solid var(--outline-var); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }\n.card-pad { padding: var(--s3); }\n.card-hover { transition: transform .3s var(--ease), box-shadow .3s var(--ease), border-color .2s; }\n.card-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--leaf); }\n\n/* Glass card on dark sections */\n.glass { background: var(--glass-dark); border: 1px solid var(--d-outline-strong); border-radius: var(--r-lg);\n  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }\n.glass-2 { background: var(--glass-dark-2); border: 1px solid var(--d-outline); }\n\n/* Metric card */\n.metric { padding: var(--s3); border-radius: var(--r-lg); }\n.metric .label { font-size: 12.5px; font-weight: 600; letter-spacing:.04em; text-transform: uppercase; color: var(--on-surface-var); }\n.metric .value { font-family: var(--font-display); font-size: 30px; font-weight: 700; letter-spacing:-.025em; margin-top: 6px; }\n.metric .delta { font-size: 13px; font-weight: 700; margin-top: 4px; }\n.delta-pos { color: #2c6b3d; } .delta-neg { color: var(--neg); }\n\n/* ---------- Inputs ---------- */\n.field { display:flex; flex-direction:column; gap:7px; }\n.field label { font-size: 13px; font-weight: 600; color: var(--on-surface-var); }\n.input, select.input, textarea.input {\n  width: 100%; font-family: var(--font-body); font-size: 15px; color: var(--on-surface);\n  background: var(--c-lowest); border: 1px solid var(--outline-var); border-radius: var(--r);\n  padding: 12px 14px; transition: border-color .18s var(--ease), box-shadow .18s var(--ease);\n}\n.input:focus, select.input:focus, textarea.input:focus { outline: none; border-color: var(--lime-dim); box-shadow: 0 0 0 3px rgba(168,214,66,.28); }\n.input::placeholder { color: var(--outline); }\n.input-dark { background: var(--glass-dark); border-color: var(--d-outline-strong); color: var(--d-ink); }\n.input-dark::placeholder { color: var(--d-ink-var); }\n\n/* ---------- Progress ---------- */\n.bar { height: 8px; border-radius: var(--r-full); background: var(--c-high); overflow: hidden; }\n.bar > i { display:block; height:100%; background: linear-gradient(90deg, var(--lime-dim), var(--lime)); border-radius: inherit; transition: width .6s var(--ease); }\n.bar-dark { background: rgba(255,255,255,.10); }\n\n/* ---------- Tables ---------- */\n.tbl { width:100%; border-collapse: collapse; font-size: 14px; }\n.tbl th { text-align:left; font-size: 12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color: var(--on-surface-var); padding: 12px 14px; border-bottom: 1px solid var(--outline-var); }\n.tbl td { padding: 14px; border-bottom: 1px solid var(--c-high); }\n.tbl tr:hover td { background: var(--c-low); }\n\n/* ---------- Locked overlay ---------- */\n.lock-card { position: relative; overflow: hidden; }\n.lock-veil { position:absolute; inset:0; background: linear-gradient(180deg, rgba(15,50,24,.04), rgba(15,50,24,.55)); backdrop-filter: blur(2px); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; text-align:center; padding: 24px; }\n\n/* ---------- Tabs ---------- */\n.tabs { display:flex; gap:4px; border-bottom: 1px solid var(--outline-var); }\n.tab { padding: 10px 16px; font-size:14px; font-weight:600; color: var(--on-surface-var); border-bottom: 2px solid transparent; margin-bottom:-1px; cursor:pointer; transition: color .15s, border-color .15s; }\n.tab.active { color: var(--primary); border-bottom-color: var(--lime-dim); }\n\n/* ---------- Glow / ambient ---------- */\n.glow { position:absolute; border-radius:50%; filter: blur(80px); opacity:.5; pointer-events:none; z-index:0; }\n.glow-lime { background: radial-gradient(circle, rgba(168,214,66,.55), transparent 70%); }\n.glow-leaf { background: radial-gradient(circle, rgba(108,158,117,.45), transparent 70%); }\n\n/* ---------- Utilities ---------- */\n.dark-sec { background: var(--d-bg); color: var(--d-ink); position: relative; }\n.dark-sec h1,.dark-sec h2,.dark-sec h3,.dark-sec h4 { color: var(--d-ink); }\n.text-lime { color: var(--lime-ink); }\n.text-pos { color: #2c6b3d; } .text-neg { color: var(--neg); }\n.rounded-xl { border-radius: var(--r-xl); }\n.sticky-top { position: sticky; top: 0; z-index: 40; }\n.divider { height:1px; background: var(--outline-var); border:0; margin: 0; }\n.skeleton { background: linear-gradient(90deg,var(--c) 25%,var(--c-high) 37%,var(--c) 63%); background-size: 400% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r); }\n@keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }\n\n/* ---------- Entrance & scroll reveal (v3) ----------\n   JS adds `.armed` only to BELOW-the-fold elements on a visible document, then\n   `.in` when they scroll into view. Above-the-fold / hidden-tab / JS-off content\n   is never touched — so it can never flash or be stranded invisible, and reveals\n   still fire even when the page first loaded in a background tab. */\n.reveal.armed { opacity:0; transform: translateY(30px); transition: opacity .85s var(--ease), transform .85s var(--ease); }\n.reveal.armed.in { opacity:1; transform:none; }\n.reveal-fade.armed { opacity:0; transition: opacity 1.1s var(--ease); }\n.reveal-fade.armed.in { opacity:1; }\n.reveal-stagger.armed > * { opacity:0; transform: translateY(26px); transition: opacity .72s var(--ease), transform .72s var(--ease); }\n.reveal-stagger.armed.in > * { opacity:1; transform:none; }\n.reveal-stagger.armed.in > *:nth-child(1){ transition-delay:0s }\n.reveal-stagger.armed.in > *:nth-child(2){ transition-delay:.08s }\n.reveal-stagger.armed.in > *:nth-child(3){ transition-delay:.16s }\n.reveal-stagger.armed.in > *:nth-child(4){ transition-delay:.24s }\n.reveal-stagger.armed.in > *:nth-child(5){ transition-delay:.32s }\n.reveal-stagger.armed.in > *:nth-child(6){ transition-delay:.40s }\n.reveal-stagger.armed.in > *:nth-child(n+7){ transition-delay:.48s }\n\n/* On-load settle (transform only — never hides, so always flash-free) */\n.fade-up { animation: fadeUpSettle .7s var(--ease) both; }\n@keyframes fadeUpSettle { from{ transform: translateY(12px) } to{ transform: none } }\n\n/* Ambient hero motion graphics */\n.floaty { animation: floaty 7s var(--ease-in-out) infinite; }\n@keyframes floaty { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }\n.glow-pulse { animation: glowPulse 9s ease-in-out infinite; }\n@keyframes glowPulse { 0%,100%{ opacity:.42; transform:scale(1) } 50%{ opacity:.6; transform:scale(1.08) } }\n.draw-line { stroke-dasharray: var(--len); stroke-dashoffset: var(--len); animation: drawLine 1.6s var(--ease) .25s forwards; }\n@keyframes drawLine { to { stroke-dashoffset: 0; } }\n\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }\n  .reveal.armed, .reveal-fade.armed, .reveal-stagger.armed > * { opacity:1 !important; transform:none !important; }\n  .fade-up, .floaty, .glow-pulse { animation: none !important; }\n  .draw-line { stroke-dashoffset: 0 !important; animation: none !important; }\n}\n\n/* Scrollbar */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-thumb { background: var(--outline-var); border-radius: 8px; border: 2px solid var(--surface); }\n::-webkit-scrollbar-thumb:hover { background: var(--outline); }\n<\u002Fstyle>\n<script src=\"6b63665e-baa4-4094-8852-5837c69c04ea\"><\u002Fscript>\n<script src=\"4a50419b-6257-4b95-9e64-f94f6131e850\"><\u002Fscript>\n<style>\n  .bento{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;}\n  .col-4{grid-column:span 4;} .col-5{grid-column:span 5;} .col-6{grid-column:span 6;} .col-7{grid-column:span 7;} .col-8{grid-column:span 8;} .col-12{grid-column:span 12;}\n  .mod{background:var(--c-lowest);border:1px solid weight:700;font-size:15px;color:var(--d-ink);font-variant-numeric:tabular-nums;transition:color .45s var(--ease);}\n  .px-chg{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px;}\n  .flash-up{color:var(--lime)!important;} .flash-dn{color:var(--neg-on-dark)!important;}\n  /* Market news */\n  .news-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--c-high);}\n  .news-item:last-child{border-bottom:none;}\n  .news-impact{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none;}\n  .imp-high{background:var(--neg);} .imp-med{background:var(--warn);} .imp-low{background:var(--leaf);}\n  .news-head{font-weight:600;font-size:14px;line-height:1.42;text-wrap:pretty;}\n  .news-head:hover{color:var(--primary);}\n  .news-meta{font-size:12px;color:var(--on-surface-var);margin-top:4px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}\n  .news-legend{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--on-surface-var);}\n  @media(max-width:1100px){.col-4,.col-5,.col-6,.col-7,.col-8{grid-column:span 12;}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n  <div id=\"side\"><\u002Fdiv>\n  <div class=\"app-main\">\n    <div id=\"top\"><\u002Fdiv>\n    <div class=\"app-body\">\n      <div class=\"between\" style=\"margin-bottom:20px;flex-wrap:wrap;gap:12px;\">\n        <div class=\"switch\">\n          <a href=\"?view=new\" id=\"sw-new\">New user<\u002Fa>\n          <a href=\"?view=pro\" id=\"sw-pro\">Pro member<\u002Fa>\n          <a href=\"?view=basic\" id=\"sw-basic\">Basic member<\u002Fa>\n        <\u002Fdiv>\n        <span class=\"muted\" style=\"font-size:12.5px;\">Dashboard state preview<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bento\" id=\"bento\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst view = new URLSearchParams(location.search).get('view')||'pro';\nconst plan = view==='basic'?'basic':'pro';\ndocument.getElementById('side').outerHTML = FXShell.surfaceSidebar('member','Dashboard',{plan, footer:`<div style=\"padding:14px;border-top:1px solid var(--d-outline);\"><a href=\"../public/pricing.html\" class=\"btn btn-lime btn-sm btn-block\">${plan==='basic'?'Upgrade to Pro':'Manage plan'}<\u002Fa><\u002Fdiv>`});\nFXShell.appStyles && document.head.insertAdjacentHTML('beforeend', FXShell.appStyles());\ndocument.getElementById('top').outerHTML = FXShell.appTop({title:'Dashboard', user:'Alex Rivera', right:`<span class=\"chip ${plan==='basic'?'chip-outline':'chip-lime'}\">${plan==='basic'?'Basic':'Pro'}<\u002Fspan>`});\n['new','pro','basic'].forEach(v=>document.getElementById('sw-'+v).classList.toggle('on', v===view));\n\nconst tierBadge = plan==='basic'?'<span class=\"chip\" style=\"background:rgba(255,255,255,.12);color:#fff;border:1px solid var(--d-outline-strong);\">Basic<\u002Fspan>':'<span class=\"chip chip-lime-d\">Pro<\u002Fspan>';\n\nfunction welcome(){\n  return `<div class=\"mod welcome col-12\">\n    <div class=\"glow glow-lime\" style=\"width:300px;height:300px;top:-160px;right:-80px;opacity:.25;\"><\u002Fdiv>\n    <div class=\"between\" style=\"position:relative;z-index:1;flex-wrap:wrap;gap:16px;\">\n      <div>\n        <div class=\"row gap2\" style=\"margin-bottom:8px;\">${tierBadge}<span class=\"chip\" style=\"background:rgba(255,255,255,.1);color:var(--lime);border:1px solid var(--d-outline-strong);\">🔥 12-day streak<\u002Fspan><span class=\"chip\" style=\"background:rgba(255,255,255,.1);color:#fff;border:1px solid var(--d-outline-strong);\">⚡ 1,840 XP<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h-md\" style=\"color:#fff;\">Good morning, Alex<\u002Fh2>\n        <p style=\"color:var(--d-ink-var);margin:6px 0 0;font-size:14.5px;\">${view==='new'?'Let’s get you set up, finish your checklist to unlock the full dashboard.':'You’re on track. Here’s what to focus on today.'}<\u002Fp>\n      <\u002Fdiv>\n      ${plan==='basic'?`<a href=\"../public/pricing.html\" class=\"btn btn-lime\">Upgrade to Pro →<\u002Fa>`:`<a href=\"lesson.html\" class=\"btn btn-lime\">Continue learning →<\u002Fa>`}\n    <\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction newUser(){\n  const items=[['Complete trading profile',1],['Set account size',1],['Start Entry Course',0],['Watch platform walkthrough',0],['Log first practice trade',0],['Register for weekly webinar',0],['Join community pod',0]];\n  const done=items.filter(i=>i[1]).length;\n  return welcome() + `\n  <div class=\"mod col-7\">\n    <div class=\"mod-head\"><h3>Get started checklist<\u002Fh3><span class=\"chip chip-lime\">${Math.round(done/items.length*100)}% complete<\u002Fspan><\u002Fdiv>\n    <div class=\"bar\" style=\"margin-bottom:14px;\"><i style=\"width:${done/items.length*100}%\"><\u002Fi><\u002Fdiv>\n    ${items.map(([t,d])=>`<div class=\"checklist-item\"><span class=\"cl-box ${d?'done':''}\">${d?'<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#141f00\" stroke-width=\"3\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>':''}<\u002Fspan><span style=\"flex:1;${d?'color:var(--outline);text-decoration:line-through;':'font-weight:600;'}\">${t}<\u002Fspan>${!d?'<a href=\"'+(t.includes('Course')?'lesson.html':t.includes('trade')?'trade-new.html':t.includes('webinar')?'webinars.html':t.includes('pod')?'community.html':'#')+'\" class=\"btn btn-ghost btn-sm\">Start<\u002Fa>':''}<\u002Fdiv>`).join('')}\n    <a href=\"onboarding.html\" class=\"btn btn-ghost btn-sm\" style=\"margin-top:14px;\">Open full onboarding<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"mod col-5\">\n    <div class=\"mod-head\"><h3>Recommended first course<\u002Fh3><\u002Fdiv>\n    <div style=\"height:120px;border-radius:var(--r);background:linear-gradient(135deg,#0f3218,#14241b);display:flex;align-items:flex-end;padding:14px;margin-bottom:14px;\"><span class=\"chip chip-lime-d\">Entry · Tier 1<\u002Fspan><\u002Fdiv>\n    <div style=\"font-weight:700;\">What is Forex? Markets & Mechanics<\u002Fdiv>\n    <p class=\"muted\" style=\"font- Fa><a href=\"ai-tutor.html\" class=\"btn btn-glass btn-sm\" style=\"background:transparent;\">Ask AI why<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction webinarCard(){\n  if(plan==='basic') return lockedCard('Weekly live webinars','Join weekly technical, fundamental and mindset sessions with replays saved to your library.','col-4');\n  return `<div class=\"mod col-4\">\n    <div class=\"mod-head\"><h3>Upcoming webinar<\u002Fh3><span class=\"chip chip-pos\">Registered<\u002Fspan><\u002Fdiv>\n    <div style=\"font-weight:700;\">London Session Structure<\u002Fdiv>\n    <p class=\"muted\" style=\"font-size:13px;margin:5px 0 14px;\">Thu · 18:00 GMT (your time) · Marcus Vale<\u002Fp>\n    <div class=\"row gap2\"><a href=\"webinars.html\" class=\"btn btn-forest btn-sm\">Add to calendar<\u002Fa><a href=\"webinars.html?state=live\" class=\"btn btn-ghost btn-sm\">Join<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction journalCard(){\n  return `<div class=\"mod col-4\">\n    <div class=\"mod-head\"><h3>Journal snapshot<\u002Fh3><a href=\"journal.html\" class=\"muted\" style=\"font-size:13px;font-weight:600;\">View →<\u002Fa><\u002Fdiv>\n    <div class=\"mini\" style=\"margin-bottom:12px;\">\n      <div class=\"stat\"><div class=\"muted\" style=\"font-size:11px;\">This week<\u002Fdiv><div class=\"v\">7<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"muted\" style=\"font-size:11px;\">Win rate<\u002Fdiv><div class=\"v text-pos\">58%<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"muted\" style=\"font-size:11px;\">Avg R:R<\u002Fdiv><div class=\"v\">1.9<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"trade-new.html\" class=\"btn btn-lime btn-sm btn-block\">Log new trade<\u002Fa>\n  <\u002Fdiv>`;\n}\n\nfunction riskCard(){\n  return `<div class=\"mod col-4\">\n    <div class=\"mod-head\"><h3>Risk calculator<\u002Fh3><\u002Fdiv>\n    <div style=\"font-size:13px;color:var(--on-surface-var);line-height:2;\">\n      <div class=\"between\"><span>Account<\u002Fspan><strong class=\"num\">$5,000<\u002Fstrong><\u002Fdiv>\n      <div class=\"between\"><span>Risk %<\u002Fspan><strong class=\"num\">1.0%<\u002Fstrong><\u002Fdiv>\n      <div class=\"between\"><span>Position size<\u002Fspan><strong class=\"num text-pos\">0.20 lots<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"risk-calculator.html\" class=\"btn btn-ghost btn-sm btn-block\" style=\"margin-top:12px;\">Open calculator<\u002Fa>\n  <\u002Fdiv>`;\n}\n\nfunction aiCard(){\n  if(plan==='basic') return lockedCard('AI Tutor','Ask course-aware questions, get quizzed, and find your next lesson, included in Pro.','col-7');\n  return `<div class=\"mod col-7\">\n    <div class=\"mod-head\"><h3>AI Tutor<\u002Fh3><span class=\"chip chip-lime\">Course-aware<\u002Fspan><\u002Fdiv>\n    <p class=\"muted\" style=\"font-size:13.5px;margin:0 0 12px;\">Ask a question about your current lesson:<\u002Fp>\n    <div class=\"chip-row\">\n      <a href=\"ai-tutor.html\" class=\"ai-chip\">Explain liquidity<\u002Fa>\n      <a href=\"ai-tutor.html\" class=\"ai-chip\">Quiz me on order types<\u002Fa>\n      <a href=\"ai-tutor.html\" class=\"ai-chip\">What should I study next?<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction communityCard(){\n  if(plan==='basic') return lockedCard('Community & pods','Join an accountability pod of 6-10 traders with weekly goals and check-ins.','col-5');\n  return `<div class=\"mod col-5\">\n    <div class=\"mod-head\"><h3>Your pod<\u002Fh3><span class=\"chip chip-forest\">3 unread<\u002Fspan><\u002Fdiv>\n    <p style=\"font-size:13.5px;margin:0 0 10px;\"><strong>Disciplined Eight<\u002Fstrong> · 8 traders<\u002Fp>\n    <p class=\"muted\" style=\"font-size:13px;margin:0 0 14px;\">Priya checked in: “Stuck to 1% risk all week 💪”. 2 new replies in the check-in thread.<\u002Fp>\n    <a href=\"community.html\" class=\"btn btn-ghost btn-sm btn-block\">Open pod<\u002Fa>\n  <\u002Fdiv>`;\n}\n\nfunction insightCard(){\n  if(plan==='basic') return lockedCard('Performance analytics','Turn your journal into a coaching dashboard, win rate by pair, session, setup & behavior.','col-12');\n  return `<div class=\"mod col-12\" style=\"background:linear-gradient(135deg,#14241b,#0f1d16);color:var(--d-ink);border:none;position:relative;overflow:hidden;\">\n    <div class=\"glow glow-lime\" style=\"width:320px;height:200px;top:-120px;right:-80px;opacity:.14;\"><\u002Fdiv>\n    <div class=\"mod-head\" style=\"position:relative;z-index:1;\"><h3 style=\"color:#fff;\">Performance insight<\u002Fh3><span class=\"chip chip-lime-d\">AI<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;position:relative;z-index:1;\">\n      <div style=\"flex:1;min-width:260px;\">\n        <p style=\"font-size:15px;line-height:1.55;color:var(--d-ink);margin:0;\">“Your <strong style=\"color:var(--lime);\">Friday trades<\u002Fstrong> have a 38% win rate, well below your 58% weekly average. Consider capping Friday trades at 2.”<\u002Fp>\n        <a href=\"analytics.html\" class=\"btn btn-lime btn-sm\" style=\"margin-top:16px;\">Review analytics<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;flex:none;\">\n        <div><div style=\"font-size:11px;color:var(--d-ink-var);text-transform:uppercase;letter-spacing:.04em;\">Net R · 30d<\u002Fdiv><div style=\"font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--lime);margin-top:4px;\">+18.4R<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:var(--d-ink-var);text-transform:uppercase;letter-spacing:.04em;\">Best day<\u002Fdiv><div style=\"font-family:var(--font-display);font-weight:700;font-size:24px;color:#fff;margin-top:4px;\">Tue<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;z-index:1;margin-top:18px;\">\n      <div id=\"insChart\" style=\"width:100%;height:130px;\"><\u002Fdiv>\n      <div class=\"between\" style=\"margin-top:6px;font-size:11px;color:var(--d-ink-var);\"><span>Mon<\u002Fspan><span>Tue<\u002Fspan><span>Wed<\u002Fspan><span>Thu<\u002Fspan><span>Fri<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction livePricesCard(){\n  return `<div class=\"mod col-5\" style=\"background:linear-gradient(150deg,#0f1d16,#14241b);border:none;color:var(--d-ink);position:relative;overflow:hidden;\">\n    <div class=\"glow glow-lime\" style=\"width:240px;height:170px;top:-120px;left:-70px;opacity:.10;\"><\u002Fdiv>\n    <div class=\"mod-head\" style=\"position:relative;z-index:1;\">\n      <h3 style=\"color:#fff;\">Live prices<\u002Fh3>\n      <span class=\"chip\" style=\"background:rgba(255,255,255,.08);color:var(--d-ink-var);border:1px solid var(--d-outline-strong);\"><span class=\"dot dot-live\"><\u002Fspan> Live<\u002Fspan>\n    <\u002Fdiv>\n    <div id=\"pxList\" style=\"position:relative;z-index:1;\"><\u002Fdiv>\n    <a href=\"trade-ideas.html\" class=\"btn btn-glass btn-sm btn-block\" style=\"margin-top:14px;position:relative;z-index:1;\">See trade ideas →<\u002Fa>\n  <\u002Fdiv>`;\n}\n\nfunction newsCard(){\n  const news=[\n    {imp:'high', t:'8m',  head:'USD firms as Fed officials signal patience on the path to rate cuts', src:'Macro wire', tag:'USD'},\n    {imp:'high', t:'34m', head:'Gold extends record run past $2,340 on safe-haven demand', src:'Metals desk', tag:'XAU'},\n    {imp:'med',  t:'1h',  head:'GBP slips ahead of tomorrow’s UK inflation print', src:'FX daily', tag:'GBP'},\n    {imp:'med',  t:'2h',  head:'Intervention talk lifts yen off its multi-decade lows', src:'Asia open', tag:'JPY'},\n    {imp:'low',  t:'3h',  head:'Crude steadies as traders weigh OPEC+ supply signals', src:'Energy', tag:'OIL'},\n  ];\n  const impC={high:'imp-high',med:'imp-med',low:'imp-low'};\n  return `<div class=\"mod col-7\">\n    <div class=\"mod-head\"><h3>Market news<\u002Fh3>\n      <div class=\"row gap3\"><span class=\"news-legend\"><span class=\"news-impact imp-high\" style=\"margin:0;\"><\u002Fspan>High impact<\u002Fspan><a href=\"trade-ideas.html\" class=\"muted\" style=\"font-size:13px;font-weight:600;\">All news →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    ${news.map(n=>`<a href=\"trade-ideas.html\" class=\"news-item\">\n      <span class=\"news-impact ${impC[n.imp]}\"><\u002Fspan>\n      <div style=\"flex:1;min-width:0;\">\n        <div class=\"news-head\">${n.head}<\u002Fdiv>\n        <div class=\"news-meta\"><span>${n.src}<\u002Fspan><span>·<\u002Fspan><span>${n.t} ago<\u002Fspan><span class=\"chip chip-outline\" style=\"padding:1px 8px;font-size:11px;\">${n.tag}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fa>`).join('')}\n  <\u002Fdiv>`;\n}\n\nfunction lockedCard(title, body, col){\n  return `<div class=\"mod lock-card ${col}\" style=\"min-height:160px;\">\n    <div class=\"lock-veil\" style=\"position:relative;background:none;backdrop-filter:none;align-items:flex-start;text-align:left;padding:0;\">\n      <div class=\"row gap1\"><span style=\"width:30px;height:30px;border-radius:8px;background:var(--c);display:grid;place-items:center;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--on-surface-var)\" stroke-width=\"2\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"/><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"/><\u002Fsvg><\u002Fspan><h3>${title}<\u002Fh3><\u002Fdiv>\n      <p class=\"muted\" style=\"font-size:13.5px;margin:10px 0 14px;\">${body}<\u002Fp>\n      <a href=\"../public/pricing.html\" class=\"btn btn-forest btn-sm\">Upgrade to Pro<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nconst bento = document.getElementById('bento');\nif(view==='new'){ bento.innerHTML = newUser(); }\nelse {\n  bento.innerHTML = welcome() + continueCard() + focusCard() + livePricesCard() + newsCard() + webinarCard() + journalCard() + riskCard() + aiCard() + communityCard() + insightCard();\n  if(plan!=='basic') FX.areaChart(document.getElementById('insChart'), {data:[5,6.2,5.4,7.1,6.6,8,7.4,9.2,8.6,10.4,9.8,11.6,10.8,12.8,11.4,9.6,10.8,8.4,9.6,11.2], height:130, dark:true, color:'#a8d642'});\n}\n\n/* ---- Live prices ticker ---- */\nconst PAIRS=[\n  {s:'EUR/USD', p:1.0842, dp:4, vol:0.0006, chg:0.18},\n  {s:'GBP/USD', p:1.2715, dp:4, vol:0.0007, chg:-0.12},\n  {s:'USD/JPY', p:156.38, dp:2, vol:0.06,   chg:0.34},\n  {s:'XAU/USD', p:2341.2, dp:2, vol:1.10,   chg:0.92},\n  {s:'BTC/USD', p:67420,  dp:0, vol:70,     chg:2.14},\n  {s:'AUD/USD', p:0.6648, dp:4, vol:0.0005, chg:-0.27},\n];\nconst fmt=(v,dp)=>v.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp});\nfunction renderPrices(){\n  const host=document.getElementById('pxList'); if(!host) return;\n  PAIRS.forEach(p=>{\n    p.open = p.p/(1+p.chg/100);\n    p.series = Array.from({length:22},(_,k)=>p.open*(1+(Math.sin(k/3.2)*0.4+(Math.random()-0.5))*(p.vol/p.p)*5));\n    p.series[p.series.length-1]=p.p;\n  });\n  host.innerHTML = PAIRS.map((p,i)=>{\n    const up=p.chg>=0;\n    return `<div class=\"px-row\">\n      <span class=\"px-pair\">${p.s}<\u002Fspan>\n      <div class=\"px-spark\" id=\"spk${i}\"><\u002Fdiv>\n      <div class=\"px-val\">\n        <div class=\"px-price\" id=\"pp${i}\">${fmt(p.p,p.dp)}<\u002Fdiv>\n        <div class=\"px-chg\" id=\"pc${i}\" style=\"color:${up?'var(--lime)':'var(--neg-on-dark)'}\">${up?'▲':'▼'} ${Math.abs(p.chg).toFixed(2)}%<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  PAIRS.forEach((p,i)=>FX.spark(document.getElementById('spk'+i), p.series, p.chg>=0?'#a8d642':'#ff897d'));\n}\nfunction tickPrices(){\n  if(document.hidden || !document.getElementById('pxList')) return;\n  PAIRS.forEach((p,i)=>{\n    const prev=p.p;\n    p.p = Math.max(p.p + (Math.random()-0.48)*p.vol*2, p.vol);\n    p.chg = (p.p-p.open)/p.open*100;\n    p.series.push(p.p); if(p.series.length>22) p.series.shift();\n    const up=p.chg>=0, ppEl=document.getElementById('pp'+i), pcEl=document.getElementById('pc'+i);\n    ppEl.textContent=fmt(p.p,p.dp);\n    const cls=p.p>=prev?'flash-up':'flash-dn';\n    ppEl.classList.add(cls); setTimeout(()=>ppEl.classList.remove(cls),520);\n    pcEl.style.color=up?'var(--lime)':'var(--neg-on-dark)';\n    pcEl.textContent=(up?'▲':'▼')+' '+Math.abs(p.chg).toFixed(2)+'%';\n    FX.spark(document.getElementById('spk'+i), p.series, up?'#a8d642':'#ff897d');\n  });\n}\nrenderPrices();\nif(document.getElementById('pxList')) setInterval(tickPrices, 2200);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
