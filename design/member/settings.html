<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Academy, Settings</title>
<link rel="stylesheet" href="../assets/lumina.css">
<script src="../assets/shell.js"></script>
<script src="../assets/lumina.js"></script>
<style>
  .slayout{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start;}
  .snav{position:sticky;top:80px;}
  .sn{display:block;padding:9px 12px;border-radius:8px;font-size:14px;font-weight:600;color:var(--on-surface-var);cursor:pointer;transition:.15s;}
  .sn.on{background:var(--primary-container);color:var(--on-primary-container);}
  .sn:not(.on):hover{background:var(--c-low);}
  .panel{background:var(--c-lowest);border:1px solid var(--outline-var);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
  .ph{font-size:16px;font-weight:700;margin:0 0 4px;}
  .psub{font-size:13px;color:var(--on-surface-var);margin:0 0 18px;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--c-high);}
  .toggle-row:last-child{border-bottom:none;}
  .sw{width:44px;height:26px;border-radius:9999px;background:var(--c-highest);position:relative;cursor:pointer;transition:.2s;flex:none;}
  .sw.on{background:var(--lime-dim);}
  .sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .sw.on::after{left:21px;}
  .avatar-lg{width:72px;height:72px;border-radius:50%;background:linear-gradient(150deg,#0f3218,#436648);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:26px;}
  @media(max-width:820px){.slayout{grid-template-columns:1fr;}.snav{position:static;display:flex;gap:6px;overflow-x:auto;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div id="side"></div>
  <div class="app-main">
    <div id="top"></div>
    <div class="app-body">
      <h1 class="h-md" style="margin:0 0 20px;">Settings</h1>
      <div class="slayout">
        <div class="snav">
          <div class="sn on">Profile</div>
          <div class="sn">Notifications</div>
          <div class="sn">Preferences</div>
          <div class="sn">Security</div>
        </div>
        <div>
          <div class="panel">
            <h3 class="ph">Profile</h3>
            <p class="psub">This is how you appear in the community and on certificates.</p>
            <div class="row gap3" style="margin-bottom:20px;">
              <div class="avatar-lg">AR</div>
              <div><button class="btn btn-ghost btn-sm">Change photo</button><p class="muted" style="font-size:12px;margin:8px 0 0;">JPG or PNG, max 2MB</p></div>
            </div>
            <div class="frow">
              <div class="field"><label>Full name</label><input class="input" value="Alex Rivera"></div>
              <div class="field"><label>Display name</label><input class="input" value="Alex R."></div>
            </div>
            <div class="frow">
              <div class="field"><label>Email</label><input class="input" value="alex@example.com"></div>
              <div class="field"><label>Country</label><select class="input"><option>United Kingdom</option><option>United States</option><option>Germany</option></select></div>
            </div>
            <div class="field" style="margin-bottom:18px;"><label>Bio</label><textarea class="input" rows="3">Aspiring swing trader focused on market structure and risk discipline.</textarea></div>
            <button class="btn btn-forest" onclick="FX.toast('Profile saved')">Save changes</button>
          </div>

          <div class="panel">
            <h3 class="ph">Notifications</h3>
            <p class="psub">Choose what you hear about. You can fine-tune these any time.</p>
            <div id="toggles"></div>
          </div>

          <div class="panel">
            <h3 class="ph">Learning preferences</h3>
            <p class="psub">Tune the experience around how you study.</p>
            <div class="frow">
              <div class="field"><label>Risk profile (for examples)</label><select class="input"><option>Conservative · 0.5% risk</option><option selected>Standard · 1% risk</option><option>Defined · 2% risk</option></select></div>
              <div class="field"><label>Default session</label><select class="input"><option>London</option><option>New York</option><option>Asia</option></select></div>
            </div>
            <button class="btn btn-forest" onclick="FX.toast('Preferences saved')">Save preferences</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const plan = new URLSearchParams(location.search).get('plan')||'pro';
document.getElementById('side').outerHTML = FXShell.surfaceSidebar('member','Settings',{plan});
document.head.insertAdjacentHTML('beforeend', FXShell.appStyles());
document.getElementById('top').outerHTML = FXShell.appTop({title:'Settings', right:`<span class="chip ${plan==='basic'?'chip-outline':'chip-lime'}">${plan==='basic'?'Basic':'Pro'}</span>`});

const toggles=[['Live webinar reminders','Get notified 30 minutes before sessions',1],['New trade ideas','When educators publish a new idea',1],['Community replies','When someone replies to your posts',1],['Weekly progress digest','A summary of your learning each week',0],['Product updates','New features and platform news',0]];
document.getElementById('toggles').innerHTML = toggles.map(t=>`<div class="toggle-row"><div><div style="font-weight:600;font-size:14px;">${t[0]}</div><div class="muted" style="font-size:12.5px;">${t[1]}</div></div><div class="sw ${t[2]?'on':''}"></div></div>`).join('');
document.querySelectorAll('.sw').forEach(s=>s.onclick=()=>s.classList.toggle('on'));
document.querySelectorAll('.sn').forEach(s=>s.onclick=()=>{document.querySelectorAll('.sn').forEach(x=>x.classList.remove('on'));s.classList.add('on');});
</script>
</body>
</html>
