# CI — typecheck, test, build (the real merge gates) + non-blocking lint.
#
# Real gates today: typecheck + test + build (all via Turborepo).
# `pnpm lint` is included but NON-BLOCKING because ESLint config is still
# pending in some packages (turbo `lint` is a no-op there). Once the real
# ESLint config lands, drop `continue-on-error` from the lint step to gate it.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this job only needs to read the repo.
permissions:
  contents: read

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # pnpm must be set up BEFORE setup-node so `cache: pnpm` can find it.
      # Version is taken from the `packageManager` field in package.json.
      # Specifying `version:` here too triggers ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NON-BLOCKING: lint is a no-op in packages whose ESLint config is
      # still pending. Surfaced for visibility; not a merge gate yet.
      # TODO(F6): remove continue-on-error once real ESLint config lands.
      - name: Lint (non-blocking — ESLint config pending)
        run: pnpm lint
        continue-on-error: true

      # --- Real merge gates below ---
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # NEXT_PUBLIC_* are inlined at build time, so the build needs them.
          # These are publishable, client-safe (RLS-protected) values sourced
          # from repo variables — not secrets.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: 'false'
