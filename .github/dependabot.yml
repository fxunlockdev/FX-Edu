# Dependabot — weekly dependency + GitHub Actions updates.
#
# pnpm workspaces are supported by the `npm` ecosystem. Dependabot does not
# auto-discover workspace members, so each app/package is listed explicitly.
# The root entry covers the shared root manifest (turbo, prettier, typescript).
# Updates are grouped to keep PR volume manageable; majors are separated so a
# breaking bump is reviewed on its own.
version: 2

updates:
  # ---- Root workspace manifest ----
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      root-minor-patch:
        update-types: ["minor", "patch"]

  # ---- Apps ----
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "apps/web"]
    groups:
      web-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "apps/api"]
    groups:
      api-minor-patch:
        update-types: ["minor", "patch"]

  # ---- Packages ----
  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "packages/ui"]
    groups:
      ui-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/packages/config"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "packages/config"]
    groups:
      config-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/packages/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "packages/contracts"]
    groups:
      contracts-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/packages/entitlements"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "packages/entitlements"]
    groups:
      entitlements-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/packages/db"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "packages/db"]
    groups:
      db-minor-patch:
        update-types: ["minor", "patch"]

  # ---- GitHub Actions (workflow action pins) ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      actions-all:
        patterns: ["*"]
